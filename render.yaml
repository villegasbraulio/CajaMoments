services:
  - type: web
    name: caja-moments-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "True"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@cajamoments.local
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: caja-moments-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: BACKEND_URL
        value: https://caja-moments-api.onrender.com
      - key: FRONTEND_URL
        value: https://caja-moments-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://caja-moments-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://caja-moments-web.onrender.com

  - type: static
    name: caja-moments-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://caja-moments-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: caja-moments-db
    plan: free
    region: oregon
