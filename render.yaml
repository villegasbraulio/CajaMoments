services:
  - type: web
    name: caja-moments-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "True"
      - key: VERCEL
        value: "True"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@cajamoments.local
      - key: ADMIN_PASSWORD
        value: CajaMoments2026!
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: caja-moments-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"

databases:
  - name: caja-moments-db
    plan: free
    region: oregon
