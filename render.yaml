services:
  - type: web
    name: caja-moments-api
    runtime: python
    rootDir: backend
    plan: starter
    region: oregon
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate && python manage.py seed_initial_data --skip-examples
    startCommand: python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: caja-moments-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"

  - type: web
    name: caja-moments-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://caja-moments-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: caja-moments-db
    plan: basic-256mb
    region: oregon
