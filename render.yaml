services:
  - type: web
    name: caja-moments-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: caja-moments-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"

databases:
  - name: caja-moments-db
    plan: free
    region: oregon
